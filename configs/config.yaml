# ============================================================
# EarningsLens Configuration
# ============================================================

project:
  name: "EarningsLens"
  version: "1.0.0"
  description: "Agentic RAG System for LLM-Powered Moving Target Detection"

# --- WRDS Credentials & Connection ---
wrds:
  username: "${WRDS_USERNAME}"        # Set via environment variable
  # Password is entered interactively or via .pgpass

# --- Data Parameters ---
data:
  # Transcript scope
  transcripts:
    start_date: "2006-01-01"
    end_date: "2024-12-31"
    key_dev_event_type_id: 48          # Earnings calls only
    component_type_ids: [2, 3, 4]      # Presentation, Analyst Q, Mgmt Answer
    universe: "sp500"                  # "sp500" or "all"

  # CRSP returns
  crsp:
    start_date: "2006-01-01"
    end_date: "2024-12-31"
    exchcd: [1, 2, 3]                  # NYSE, AMEX, NASDAQ
    shrcd: [10, 11]                    # Ordinary common shares

  # Compustat fundamentals
  compustat:
    start_date: "2005-10-01"
    end_date: "2024-12-31"
    indfmt: "INDL"
    datafmt: "STD"
    popsrc: "D"
    consol: "C"

  # IBES analyst forecasts
  ibes:
    start_date: "2006-01-01"
    end_date: "2024-06-30"
    fpi: "1"                           # One-quarter-ahead
    fiscal_period: "QTR"

  # Fama-French factors
  ff_factors:
    start_date: "2006-01-01"
    end_date: "2024-12-31"

  # Paths
  paths:
    raw: "data/raw"
    processed: "data/processed"
    cache: "data/cache"
    sample: "data/sample"

# --- Baseline (spaCy) Pipeline ---
baseline:
  spacy_model: "en_core_web_lg"
  goal_verbs:
    - "achieve"
    - "target"
    - "maintain"
    - "expect"
    - "deliver"
    - "reach"
    - "sustain"
    - "exceed"
    - "grow"
    - "generate"
    - "drive"
    - "hit"
    - "attain"
    - "improve"
    - "increase"
  ner_labels: ["MONEY", "PERCENT", "PRODUCT", "CARDINAL", "QUANTITY"]
  mt_lookback_quarters: 4              # T_{i,t-4}

# --- LLM Extraction ---
llm:
  provider: "openai"                   # "openai" or "local"

  openai:
    model: "gpt-4o-mini"
    api_key: "${OPENAI_API_KEY}"
    max_concurrent: 10
    temperature: 0.0
    max_tokens: 2048
    timeout: 60

  local:
    model_name: "mistralai/Mistral-7B-Instruct-v0.3"
    quantization: "4bit"               # For QLoRA
    vllm_port: 8000
    max_model_len: 4096

  # Chunking for long transcripts
  chunking:
    max_tokens: 2048
    overlap_sentences: 2

# --- RAG Configuration ---
rag:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  # Alternative: "text-embedding-3-small" (OpenAI)
  vector_store: "chromadb"
  chromadb:
    persist_directory: "data/cache/chromadb"
    collection_name: "target_embeddings"
  similarity_threshold:
    maintained: 0.80                   # cosine > 0.80 → maintained
    rephrased: 0.55                    # 0.55 < cosine ≤ 0.80 → rephrased
    dropped: 0.55                      # cosine ≤ 0.55 → dropped
  retrieval_quarters: 4               # Look back 4 quarters

# --- LangGraph Multi-Agent Pipeline ---
agents:
  extractor:
    name: "ExtractorAgent"
    description: "Extracts performance targets from transcript text"
    fallback_to_spacy: true

  comparator:
    name: "ComparatorAgent"
    description: "RAG-based cross-quarter target continuity matching"

  classifier:
    name: "ClassifierAgent"
    description: "Classifies dropped targets (financial/non-financial, persistent/ephemeral)"

  reporter:
    name: "ReporterAgent"
    description: "Generates structured investment risk report"

# --- Evaluation ---
evaluation:
  # Fama-MacBeth parameters
  fama_macbeth:
    min_observations: 30               # Min firms per cross-section
    newey_west_lags: 6                 # NW standard error lags
    quintile_portfolios: 5
    holding_period_months: 3

  # NLP evaluation
  nlp:
    annotation_sample_size: 100
    inter_annotator_passes: 2
    min_agreement_kappa: 0.60

  # Ablation models
  ablation_models:
    - "gpt-4o"
    - "gpt-4o-mini"
    - "mistral-7b-lora"

# --- Demo ---
demo:
  server_port: 7860
  precompute: true                     # Use pre-computed results for demo
  top_n_portfolio: 20                  # Top-N MT-score companies to display
  theme: "soft"
